apis:
  - aid: mosn:mosn
    name: MOSN
    description: >-
      MOSN is a cloud-native network proxy that supports multiple protocols (HTTP/1.1,
      HTTP/2, gRPC), dynamic routing, load balancing, observability via Prometheus
      metrics, TLS, and WASM-based custom extensions. It includes an admin API
      extension for runtime configuration and management.
