aid: mosn
name: MOSN
description: >-
  MOSN (Modular Open Smart Network) is a cloud-native network proxy written in Go,
  open-sourced by Ant Group. It serves as a Service Mesh data plane and can function
  as L4/L7 load balancer, API gateway, and cloud-native ingress, with multi-protocol
  support including HTTP/1.1, HTTP/2, and gRPC.
